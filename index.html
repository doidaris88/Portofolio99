<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio Pro v13.7 - Smart Focus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #ffffff; 
            color: #334155; 
            font-family: 'Plus Jakarta Sans', "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif; 
            min-height: 100vh; 
        }
        .font-mono { font-family: 'Roboto Mono', monospace; font-variant-numeric: tabular-nums; }
        .glass-panel { background: #f8fafc; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
        .tab-item { min-width: 140px; max-width: 180px; height: 56px; transition: all 0.2s; border-right: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; cursor: pointer; }
        .tab-active { background: white; border-bottom: 4px solid #f97316; color: #f97316; font-weight: 800; }
        .tab-inactive { color: #94a3b8; border-bottom: 3px solid transparent; }
        .btn-delete-tab { color: #ef4444; font-size: 12px; font-weight: 900; margin-left: 8px; cursor: pointer; opacity: 0.6; }
        .btn-delete-tab:hover { opacity: 1; transform: scale(1.2); }
        input { background: transparent; outline: none; border: none; color: #1e293b; width: 100%; }
        th { background-color: #f1f5f9; color: #64748b; font-size: 9px; font-weight: 900; text-transform: uppercase; padding: 12px 8px; }
        .currency-switch { font-size: 8px; font-weight: 900; padding: 2px 6px; border-radius: 4px; cursor: pointer; user-select: none; }
        .idr-mode { background: #e0f2fe; color: #0369a1; }
        .usd-mode { background: #fef3c7; color: #92400e; }
        .sort-select { background: transparent; color: #f97316; font-weight: 900; border: none; outline: none; cursor: pointer; font-size: 10px; appearance: none; }
    </style>
</head>
<body class="p-0">

    <nav class="w-full bg-slate-50 border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-[1400px] mx-auto flex items-center justify-between px-2">
            <div class="flex items-center overflow-x-auto scrollbar-hide">
                <div id="portfolioTabs" class="flex items-center"></div>
                <button onclick="addNewTab()" class="px-6 h-14 text-orange-500 hover:bg-orange-50 text-2xl font-bold transition-all">+</button>
            </div>
            <button onclick="exportToExcel()" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-[10px] font-bold hover:bg-black shadow-md mr-2"> EXCEL</button>
        </div>
    </nav>

    <div class="max-w-[1400px] mx-auto space-y-6 pb-20 p-4 sm:p-6"> 
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-4 items-start">
            <div class="lg:col-span-1">
                <input type="text" id="activePortoTitle" class="text-xl font-black text-slate-800 border-b border-slate-200" oninput="saveTextOnly('title', this.value)">
                <div class="flex items-center gap-2 mt-1">
                    <p class="text-[9px] text-slate-400 font-bold tracking-[0.3em] uppercase">V13.7 Smart Focus</p>
                    <div class="h-1.5 w-16 bg-slate-100 rounded-full overflow-hidden">
                        <div id="weightProgressBar" class="h-full bg-orange-500" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 lg:col-span-4">
                <div class="glass-panel p-3 rounded-xl border-l-2 border-slate-400">
                    <span class="text-[8px] text-slate-500 font-black uppercase mb-0.5 block">Modal Dasar (IDR)</span>
                    <input type="text" id="modalInput" class="text-base font-extrabold font-mono" oninput="formatAndSave(this, 'modal')" onfocus="moveCursorToEnd(this)">
                </div>
                <div class="glass-panel p-3 rounded-xl border-l-2 border-amber-500">
                    <span class="text-[8px] text-slate-500 font-black uppercase mb-0.5 block">Kurs USD</span>
                    <input type="text" id="kursInput" class="text-base font-extrabold font-mono" oninput="formatAndSave(this, 'kurs')" onfocus="moveCursorToEnd(this)">
                </div>
                <div class="glass-panel p-3 rounded-xl border-l-2 border-orange-500 bg-orange-50/20">
                    <div class="flex justify-between items-center mb-0.5">
                        <span class="text-[8px] text-orange-600 font-black uppercase block">Portofolio Saat Ini</span>
                        <button onclick="togglePortfolioCurrency()" id="portoCurBtn" class="currency-switch idr-mode">IDR</button>
                    </div>
                    <input type="text" id="manualTotalInput" class="text-base font-black text-orange-700 font-mono" placeholder="0" oninput="handleManualTotal(this)" onfocus="moveCursorToEnd(this)">
                </div>
                <div class="bg-orange-500 p-3 rounded-xl shadow-lg flex flex-col justify-center">
                    <span class="text-[8px] text-orange-100 font-black uppercase mb-0.5 block">System Value</span>
                    <span id="systemValueLabel" class="text-base font-black text-white font-mono">$ 0.00</span>
                </div>
            </div>
        </div>

        <div class="glass-panel rounded-2xl overflow-hidden border border-slate-200 shadow-sm">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-slate-200">
                            <th class="text-center w-10">#</th>
                            <th class="text-center w-12">DEL</th>
                            <th class="min-w-[150px]">Ticker / Asset</th>
                            <th class="text-center bg-slate-100/50 w-28">Weight <select onchange="handleSortWeight(this.value)" class="sort-select"><option value="">&#128315;</option><option value="high">High</option><option value="low">Low</option></select></th>
                            <th class="text-center min-w-[120px]">Target Modal</th>
                            <th class="text-right min-w-[140px]">Actual Size</th>
                            <th class="text-right min-w-[140px]">Profit</th>
                            <th class="text-center bg-orange-50 min-w-[150px]">Action <select onchange="handleSortAction(this.value)" class="sort-select"><option value="">&#128315;</option><option value="sell">Sell</option><option value="buy">Buy</option></select></th>
                            <th class="text-right min-w-[120px]">Nominal Jual</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100 font-mono text-[11px]" id="assetTableBody"></tbody>
                </table>
            </div>
            <button onclick="addRow()" class="w-full p-4 text-[9px] font-black text-slate-400 hover:text-orange-600 hover:bg-slate-50 uppercase tracking-widest">+ Add Asset Item</button>
        </div>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="glass-panel p-4 rounded-xl border-l-4 border-emerald-500 bg-emerald-50/30">
                <div class="flex justify-between items-start mb-1"><span class="text-[8px] text-emerald-700 font-black uppercase">Total Panen</span><button onclick="togglePanelCurrency('total')" id="cur_total" class="currency-switch">IDR</button></div>
                <span id="totalProfitLabel" class="text-lg font-black text-emerald-600">Rp 0</span>
            </div>
            <div class="glass-panel p-4 rounded-xl border-l-4 border-rose-500 bg-rose-50/30">
                <div class="flex justify-between items-start mb-1"><div class="flex items-center gap-1"><span class="text-[8px] text-rose-700 font-black uppercase">Cash Alloc</span> <div class="text-[10px] font-bold text-rose-600">(<input type="number" id="percCash" class="w-5 text-right bg-transparent p-0" value="20" oninput="updateSummaries()" onfocus="moveCursorToEnd(this)">%)</div></div><button onclick="togglePanelCurrency('cash')" id="cur_cash" class="currency-switch">IDR</button></div>
                <span id="cashAllocLabel" class="text-lg font-black text-rose-600 block">Rp 0</span>
            </div>
            <div class="glass-panel p-4 rounded-xl border-l-4 border-orange-500">
                <div class="flex items-center justify-between mb-1"><div class="flex items-center gap-1"><span class="text-[8px] text-slate-500 font-black uppercase">Dist. Core</span> <div class="text-[10px] font-bold text-orange-600">(<input type="number" id="percCore" class="w-5 text-right bg-transparent p-0" value="40" oninput="updateSummaries()" onfocus="moveCursorToEnd(this)">%)</div></div><button onclick="togglePanelCurrency('core')" id="cur_core" class="currency-switch">IDR</button></div>
                <span id="distCoreLabel" class="text-lg font-black text-slate-700 block">Rp 0</span>
            </div>
            <div class="glass-panel p-4 rounded-xl border-l-4 border-slate-400">
                <div class="flex items-center justify-between mb-1"><div class="flex items-center gap-1"><span class="text-[8px] text-slate-500 font-black uppercase">Dist. Defense</span> <div class="text-[10px] font-bold text-slate-500">(<input type="number" id="percDef" class="w-5 text-right bg-transparent p-0" value="40" oninput="updateSummaries()" onfocus="moveCursorToEnd(this)">%)</div></div><button onclick="togglePanelCurrency('def')" id="cur_def" class="currency-switch">IDR</button></div>
                <span id="distDefLabel" class="text-lg font-black text-slate-700 block">Rp 0</span>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'porto_v13_7_focus';
        let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
            activeTabIndex: 0,
            tabs: [{ title: "PORTFOLIO 1", modal: 1500000, kurs: 16000, manualTotal: 1500000, manualTotalCur: 'IDR', panelCurrencies: { total: 'IDR', cash: 'IDR', core: 'IDR', def: 'IDR' }, assets: [] }]
        };

        function saveToStorage() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
        
        // FUNGSI BARU: Paksa cursor ke posisi paling belakang
        function moveCursorToEnd(el) {
            setTimeout(() => {
                const val = el.value;
                el.value = '';
                el.value = val;
                el.setSelectionRange(val.length, val.length);
            }, 1);
        }

        const formatIDR = (n) => Math.round(n || 0).toLocaleString('id-ID');
        const formatUSD = (n) => (n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        function handleManualTotal(el) {
            let tab = state.tabs[state.activeTabIndex];
            let clean = el.value.replace(/[^0-9.]/g, "").replace(/^0+(?=\d)/, ""); 
            if (tab.manualTotalCur === 'IDR') clean = clean.replace(/\./g, "");
            tab.manualTotal = parseFloat(clean) || 0;
            el.value = tab.manualTotalCur === 'IDR' ? Math.round(tab.manualTotal).toLocaleString('id-ID') : clean;
            if(el.value === "") el.value = "0";
            updateSummaries(); saveToStorage();
        }

        function togglePortfolioCurrency() {
            state.tabs[state.activeTabIndex].manualTotalCur = state.tabs[state.activeTabIndex].manualTotalCur === 'IDR' ? 'USD' : 'IDR';
            render(); 
        }

        function updateSummaries() {
            const tab = state.tabs[state.activeTabIndex];
            const kurs = tab.kurs || 1;
            const systemValueUSD = tab.modal / kurs;
            document.getElementById('systemValueLabel').innerText = "$ " + formatUSD(systemValueUSD);
            let totalHarvestedIDR = 0; let totalWeight = 0;

            tab.assets.forEach((asset, idx) => {
                const isUSD = asset.currency === 'USD';
                const weight = asset.weight || 0; totalWeight += weight;
                let targetModalInCur = isUSD ? ((weight / 100) * systemValueUSD) : ((weight / 100) * tab.modal);
                const profitMurni = asset.actual - targetModalInCur;
                const totalPortoInAssetCur = isUSD ? (tab.manualTotalCur === 'USD' ? tab.manualTotal : tab.manualTotal / kurs) : (tab.manualTotalCur === 'IDR' ? tab.manualTotal : tab.manualTotal * kurs);
                const targetIdealInCur = (weight / 100) * totalPortoInAssetCur;
                const diff = asset.actual - targetIdealInCur;
                const nominalJual = diff > 0.01 ? diff : 0;
                totalHarvestedIDR += isUSD ? (nominalJual * kurs) : nominalJual;

                const row = document.getElementById(`row-${idx}`);
                if (row) {
                    row.querySelector('.target-cell').innerText = isUSD ? '$'+formatUSD(targetModalInCur) : 'Rp'+formatIDR(targetModalInCur);
                    const pCell = row.querySelector('.profit-cell');
                    pCell.innerText = isUSD ? formatUSD(profitMurni) : formatIDR(profitMurni);
                    pCell.className = `p-3 text-right font-bold profit-cell ${profitMurni >= 0 ? 'text-emerald-600' : 'text-rose-600'}`;
                    const aCell = row.querySelector('.action-cell');
                    if (diff < -0.01) aCell.innerHTML = `<span class="text-emerald-600 font-bold">BUY: ${isUSD ? '$'+formatUSD(Math.abs(diff)) : 'Rp'+formatIDR(Math.abs(diff))}</span>`;
                    else if (diff > 0.01) aCell.innerHTML = `<span class="text-rose-500 font-bold">SELL: ${isUSD ? '$'+formatUSD(diff) : 'Rp'+formatIDR(diff)}</span>`;
                    else aCell.innerHTML = '<span class="text-slate-400">HOLD</span>';
                    row.querySelector('.sell-cell').innerText = isUSD ? '$'+formatUSD(nominalJual) : 'Rp'+formatIDR(nominalJual);
                }
            });

            document.getElementById('weightProgressBar').style.width = totalWeight + '%';
            const pMap = { total: totalHarvestedIDR, cash: totalHarvestedIDR * ((parseFloat(document.getElementById('percCash').value) || 0)/100), core: 0, def: 0 };
            pMap.core = (totalHarvestedIDR - pMap.cash) * ((parseFloat(document.getElementById('percCore').value) || 0) / 80);
            pMap.def = (totalHarvestedIDR - pMap.cash) * ((parseFloat(document.getElementById('percDef').value) || 0) / 80);
            
            const ids = { total: 'totalProfitLabel', cash: 'cashAllocLabel', core: 'distCoreLabel', def: 'distDefLabel' };
            Object.keys(pMap).forEach(k => {
                const isUSD = tab.panelCurrencies[k] === 'USD';
                document.getElementById(ids[k]).innerText = isUSD ? "$ " + formatUSD(pMap[k]/kurs) : "Rp " + formatIDR(pMap[k]);
                const btn = document.getElementById(`cur_${k}`);
                if(btn) { btn.innerText = tab.panelCurrencies[k]; btn.className = `currency-switch ${isUSD ? 'usd-mode' : 'idr-mode'}`; }
            });
        }

        function formatAndSave(el, field, assetIdx = null, assetField = null) {
            let raw = el.value.replace(/\D/g, "").replace(/^0+/, "");
            let val = raw ? parseInt(raw, 10) : 0;
            if (assetIdx !== null) state.tabs[state.activeTabIndex].assets[assetIdx][assetField] = val;
            else state.tabs[state.activeTabIndex][field] = val;
            el.value = val === 0 ? "0" : val.toLocaleString('id-ID');
            updateSummaries(); saveToStorage();
        }

        function handleUsdAssetInput(el, f, i, af) {
            let valStr = el.value.replace(/[^0-9.]/g, '').replace(/^0+(?=\d)/, '');
            state.tabs[state.activeTabIndex].assets[i][af] = parseFloat(valStr) || 0;
            el.value = valStr === "" ? "0" : valStr; 
            updateSummaries(); saveToStorage();
        }

        function handleWeightInput(idx, el) {
            let valStr = el.value.replace(/^0+(?=\d)/, "");
            let numVal = parseFloat(valStr) || 0;
            el.value = valStr === "" ? "0" : valStr;
            state.tabs[state.activeTabIndex].assets[idx].weight = numVal;
            updateSummaries(); saveToStorage();
        }

        function handleSortWeight(type) { if(!type) return; state.tabs[state.activeTabIndex].assets.sort((a,b) => type === 'high' ? b.weight - a.weight : a.weight - b.weight); render(); }
        function handleSortAction(type) {
            if(!type) return; const tab = state.tabs[state.activeTabIndex]; const kurs = tab.kurs || 1;
            state.tabs[state.activeTabIndex].assets.sort((a, b) => {
                const getPorto = (cur) => cur === 'USD' ? (tab.manualTotalCur === 'USD' ? tab.manualTotal : tab.manualTotal/kurs) : (tab.manualTotalCur === 'IDR' ? tab.manualTotal : tab.manualTotal*kurs);
                const diffA = a.actual - ((a.weight/100) * getPorto(a.currency)); const diffB = b.actual - ((b.weight/100) * getPorto(b.currency));
                return type === 'sell' ? diffB - diffA : diffA - diffB;
            });
            render();
        }

        function exportToExcel() {
            const tab = state.tabs[state.activeTabIndex];
            const data = tab.assets.map((a, i) => ({ 'No': i + 1, 'Asset': a.name, 'Weight %': a.weight, 'Cur': a.currency, 'Actual': a.actual }));
            const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Portfolio"); XLSX.writeFile(wb, `${tab.title}.xlsx`);
        }

        function render() {
            const container = document.getElementById('portfolioTabs'); container.innerHTML = '';
            state.tabs.forEach((tab, idx) => {
                const btn = document.createElement('div');
                btn.className = `tab-item ${idx === state.activeTabIndex ? 'tab-active' : 'tab-inactive hover:bg-slate-50'}`;
                btn.innerHTML = `<span class="truncate font-black text-[11px]">${tab.title || 'PORTO'}</span>
                                ${state.tabs.length > 1 ? `<span onclick="event.stopPropagation(); deleteTab(${idx})" class="btn-delete-tab">&#10005;</span>` : ''}`;
                btn.onclick = () => { state.activeTabIndex = idx; render(); }; container.appendChild(btn);
            });
            const tab = state.tabs[state.activeTabIndex];
            document.getElementById('modalInput').value = tab.modal ? tab.modal.toLocaleString('id-ID') : "0";
            document.getElementById('kursInput').value = tab.kurs ? tab.kurs.toLocaleString('id-ID') : "0";
            document.getElementById('activePortoTitle').value = tab.title;
            document.getElementById('manualTotalInput').value = tab.manualTotal ? (tab.manualTotalCur === 'IDR' ? Math.round(tab.manualTotal).toLocaleString('id-ID') : tab.manualTotal.toString()) : "0";
            const pBtn = document.getElementById('portoCurBtn'); pBtn.innerText = tab.manualTotalCur; pBtn.className = `currency-switch ${tab.manualTotalCur === 'USD' ? 'usd-mode' : 'idr-mode'}`;
            const tbody = document.getElementById('assetTableBody'); tbody.innerHTML = '';
            tab.assets.forEach((asset, idx) => {
                const isUSD = asset.currency === 'USD'; const tr = document.createElement('tr');
                tr.id = `row-${idx}`; tr.className = "hover:bg-slate-50 border-b border-slate-100 bg-white";
                tr.innerHTML = `
                    <td class="p-3 text-center text-slate-400 font-bold">${idx + 1}</td>
                    <td class="p-3 text-center" onclick="deleteRow(${idx})">
                        <button class="text-rose-500 font-bold hover:bg-rose-50 w-8 h-8 rounded-lg flex items-center justify-center mx-auto">&#128465;</button>
                    </td>
                    <td class="p-3"><div class="flex items-center gap-2"><input type="text" value="${asset.name}" class="font-bold uppercase" oninput="state.tabs[state.activeTabIndex].assets[${idx}].name=this.value.toUpperCase(); saveToStorage()"> <span onclick="toggleAssetCurrency(${idx})" class="currency-switch ${isUSD?'usd-mode':'idr-mode'}">${asset.currency}</span></div></td>
                    <td class="p-3 bg-slate-100/50"><input type="number" value="${asset.weight || 0}" class="text-center font-black text-orange-600" oninput="handleWeightInput(${idx}, this)" onfocus="moveCursorToEnd(this)"></td>
                    <td class="p-3 text-center text-slate-500 font-bold target-cell">-</td>
                    <td class="p-3 text-right"><input type="text" value="${isUSD ? asset.actual : asset.actual.toLocaleString('id-ID')}" class="text-right" oninput="${isUSD ? 'handleUsdAssetInput' : 'formatAndSave'}(this, null, ${idx}, 'actual')" onfocus="moveCursorToEnd(this)"></td>
                    <td class="p-3 text-right font-bold profit-cell">-</td>
                    <td class="p-3 text-center bg-orange-50/30 action-cell">-</td>
                    <td class="p-3 text-right text-rose-500 font-bold sell-cell">-</td>`;
                tbody.appendChild(tr);
            });
            updateSummaries();
        }

        function toggleAssetCurrency(i) { state.tabs[state.activeTabIndex].assets[i].currency = state.tabs[state.activeTabIndex].assets[i].currency === 'IDR' ? 'USD' : 'IDR'; saveToStorage(); render(); }
        function togglePanelCurrency(panel) { state.tabs[state.activeTabIndex].panelCurrencies[panel] = state.tabs[state.activeTabIndex].panelCurrencies[panel] === 'IDR' ? 'USD' : 'IDR'; updateSummaries(); saveToStorage(); }
        function addNewTab() { state.tabs.push({ title: "NEW", modal: 1500000, kurs: 16000, manualTotal: 1500000, manualTotalCur: 'IDR', panelCurrencies: { total: 'IDR', cash: 'IDR', core: 'IDR', def: 'IDR' }, assets: [] }); state.activeTabIndex = state.tabs.length - 1; saveToStorage(); render(); }
        function deleteTab(idx) { if(confirm('Hapus Portfolio?')) { state.tabs.splice(idx,1); state.activeTabIndex = 0; saveToStorage(); render(); } }
        function addRow() { state.tabs[state.activeTabIndex].assets.push({ name: "NEW", weight: 0, actual: 0, currency: "IDR" }); saveToStorage(); render(); }
        function deleteRow(i) { state.tabs[state.activeTabIndex].assets.splice(i, 1); saveToStorage(); render(); }
        function saveTextOnly(f, v) { state.tabs[state.activeTabIndex][f] = v; saveToStorage(); }

        render();
    </script>
</body>
</html>
